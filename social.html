<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Connect With Us</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, Helvetica, sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
overflow:hidden;
background:#020617;
}

/* PARTICLE SPACE BACKGROUND */

#particles-js{
position:fixed;
width:100%;
height:100%;
z-index:-2;
}

/* SHOOTING STARS */

.stars{
position:fixed;
width:100%;
height:100%;
overflow:hidden;
z-index:-1;
}

.star{
position:absolute;
width:3px;
height:3px;
background:white;
border-radius:50%;
animation:shoot 6s linear infinite;
}

@keyframes shoot{

0%{
transform:translateX(0) translateY(0);
opacity:1;
}

100%{
transform:translateX(-1000px) translateY(600px);
opacity:0;
}

}

/* GLASS APP UI */

.app{

width:90%;
max-width:360px;

background:rgba(255,255,255,0.12);

backdrop-filter:blur(18px);

border:1px solid rgba(255,255,255,0.25);

border-radius:25px;

padding:35px;

text-align:center;

box-shadow:0 15px 40px rgba(0,0,0,0.4);

}

/* TITLE */

.title{
color:white;
font-size:22px;
margin-bottom:30px;
letter-spacing:1px;
}

/* SOCIAL GRID */

.links{

display:grid;
grid-template-columns:repeat(3,1fr);

gap:18px;

}

/* ICON BUTTONS */

.links a{

height:65px;
width:65px;

display:flex;
align-items:center;
justify-content:center;

font-size:26px;

color:white;

border-radius:16px;

background:rgba(255,255,255,0.18);

transition:0.35s;

box-shadow:0 0 10px rgba(255,255,255,0.25);

}

/* GLOW EFFECT */

.links a:hover{

transform:translateY(-6px) scale(1.1);

box-shadow:
0 0 12px white,
0 0 25px cyan,
0 0 40px cyan;

background:rgba(255,255,255,0.35);

}

/* ICON COLORS */

.fa-instagram{color:#ff3cac;}
.fa-youtube{color:#ff0000;}
.fa-facebook{color:#1877f2;}
.fa-x-twitter{color:white;}
.fa-globe{color:#00ffd5;}
.fa-envelope{color:#ffd166;}

</style>

</head>

<body>

<div id="particles-js"></div>

<div class="stars">
<div class="star" style="top:10%; left:90%; animation-delay:0s;"></div>
<div class="star" style="top:20%; left:80%; animation-delay:2s;"></div>
<div class="star" style="top:40%; left:95%; animation-delay:4s;"></div>
<div class="star" style="top:70%; left:85%; animation-delay:1s;"></div>
<div class="star" style="top:60%; left:92%; animation-delay:3s;"></div>
</div>

<div class="app">

<div class="title">
Follow Us
</div>

<div class="links">

<a href="https://instagram.com/srisaimahavidyalaya?igsh=MTk1eTU2am42NDRvYw==" target="_blank">
<i class="fab fa-instagram"></i>
</a>

<a href="https://youtube.com/@srisaimahavidyalayanellore3441" target="_blank">
<i class="fab fa-youtube"></i>
</a>

<a href="https://facebook.com/profile.php?id=61559737310011&mibextid=ZbWKwL" target="_blank">
<i class="fab fa-facebook"></i>
</a>



<a href="https://srisaimahavidyalaya.com" target="_blank">
<i class="fas fa-globe"></i>
</a>

<a href="mailto:srisaimahavidyalaya.ssmv@gmail.com">
<i class="fas fa-envelope"></i>
</a>



</div>

</div>

<script>

particlesJS("particles-js", {

particles: {

number: {
value: 80
},

color: {
value: "#ffffff"
},

shape: {
type: "circle"
},

opacity: {
value: 0.5
},

size: {
value: 3
},

line_linked: {
enable: true,
distance: 150,
color: "#00ffff",
opacity: 0.4,
width: 1
},

move: {
enable: true,
speed: 2
}

},

interactivity: {

detect_on: "canvas",

events: {

onhover: {
enable: true,
mode: "repulse"
},

onclick: {
enable: true,
mode: "push"
}

},

modes: {

repulse: {
distance: 120
},

push: {
particles_nb: 4
}

}

},

retina_detect: true

});

</script>

</body>
</html>
